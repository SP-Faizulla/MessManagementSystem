<!doctype html>
<html>
  <head>
    <title>Admin Dashboard</title>
    <style>
      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(
          to right,
          #ff9a9e,
          #fad0c4,
          #a1c4fd,
          #c2e9fb
        );
        color: #fff;
        text-align: center;
        padding: 50px 20px;
        min-height: 100vh;
      }

      h2 {
        font-size: 40px;
        margin-bottom: 50px;
        text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        letter-spacing: 1px;
        color: #6a11cb;
      }

      .card {
        color: #fff;
        padding: 25px 40px;
        margin: 20px auto;
        width: 280px;
        border-radius: 16px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        font-weight: bold;
        font-size: 20px;
        text-decoration: none;
      }

      .card a {
        text-decoration: none;
        color: inherit;
      }

      .card:hover {
        transform: translateY(-7px) scale(1.05);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      }

      /* Different gradients for each card */
      .card1 {
        background: linear-gradient(135deg, #ff7e5f, #feb47b);
      }
      .card2 {
        background: linear-gradient(135deg, #6a11cb, #2575fc);
      }
      .card3 {
        background: linear-gradient(135deg, #43e97b, #38f9d7);
      }

      a.logout {
        display: inline-block;
        margin-top: 50px;
        padding: 14px 35px;
        background: linear-gradient(135deg, #ff5f6d, #ffc371);
        color: #fff;
        border-radius: 12px;
        text-decoration: none;
        font-weight: bold;
        font-size: 18px;
        transition:
          background 0.3s,
          transform 0.3s;
      }

      a.logout:hover {
        background: linear-gradient(135deg, #ffc371, #ff5f6d);
        transform: scale(1.05);
      }

      /* Notification Panel */
      .notification-box {
        position: fixed;
        right: 20px;
        top: 120px;
        width: 340px;
        background: white;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        color: #333;
        text-align: left;
        max-height: 450px;
        overflow-y: auto;
        border-top: 5px solid #185a9d;
        transition: all 0.3s ease;
      }

      /* Notification title */
      .notification-box h3 {
        margin-top: 0;
        margin-bottom: 10px;
        text-align: center;
        font-size: 20px;
        color: #185a9d;
        border-bottom: 2px solid #eee;
        padding-bottom: 6px;
      }

      /* Input box */
      .notification-box input {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 10px;
        outline: none;
        transition: 0.3s;
      }

      .notification-box input:focus {
        border-color: #185a9d;
        box-shadow: 0 0 5px rgba(24, 90, 157, 0.4);
      }

      /* Send button */
      .notification-box button {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #185a9d, #43cea2);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      .notification-box button:hover {
        transform: scale(1.05);
      }

      /* Individual notification card */
      .notification {
        background: #f4f7fb;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        font-size: 14px;
        border-left: 4px solid #185a9d;
        transition: 0.3s;
      }

      .notification:hover {
        background: #e9f1ff;
        transform: translateX(4px);
      }

      /* Name color */
      .notification b {
        color: #185a9d;
        font-size: 15px;
      }

      /* Time text */
      .notification small {
        color: gray;
        font-size: 12px;
      }
      /* Notification Bell */

      .bell {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 28px;
        cursor: pointer;
        background: white;
        padding: 10px 15px;
        border-radius: 50%;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        color: #185a9d;
      }

      .count {
        position: absolute;
        top: -5px;
        right: -5px;
        background: red;
        color: white;
        font-size: 12px;
        padding: 3px 6px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <h2>Admin Dashboard</h2>

    <div class="card card1">
      <a href="{{ url_for('view_feedback') }}">View Feedback</a>
    </div>
    <div class="card card2">
      <a href="{{ url_for('view_remarks') }}">View Remarks</a>
    </div>
    <div class="card card3">
      <a href="{{ url_for('view_absentees') }}">View Absentees</a>
    </div>

    <a href="{{ url_for('logout') }}" class="logout">Logout</a>

    <div class="bell" onclick="toggleNotifications()">
      🔔
      <span class="count">{{ notifications|length }}</span>
    </div>

    <div class="notification-box" id="notificationPanel">
      <h3>Notifications</h3>

      <form action="/send_notification" method="POST">
        <input
          type="text"
          name="message"
          placeholder="Write message..."
          style="width: 100%; padding: 6px"
          required
        />
        <button type="submit">Send</button>
      </form>

      <hr />

      {% for n in notifications %}

      <div class="notification">
        <b>{{ n[1] }}</b>: {{ n[2] }}
        <br />
        <small>{{ n[3] }}</small>
      </div>

      {% endfor %}
    </div>
    <script>
      function toggleNotifications() {
        let panel = document.getElementById("notificationPanel");

        if (panel.style.display === "none") {
          panel.style.display = "block";
        } else {
          panel.style.display = "none";
        }
      }
    </script>
  </body>
</html>
