<!doctype html>
<html>
  <head>
    <title>Student Dashboard</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #43cea2, #185a9d);
        text-align: center;
        color: #fff;
      }

      h2 {
        padding: 30px 0;
        font-size: 28px;
        letter-spacing: 1px;
      }

      .dashboard {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .card {
        width: 280px;
        padding: 20px;
        margin: 15px;
        border-radius: 18px;
        background: #ffffff;
        color: #333;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }

      .card a {
        text-decoration: none;
        color: inherit;
        display: block;
      }

      .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      }

      /* Individual card colors */
      .feedback {
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      }
      .remarks {
        background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      }
      .absent {
        background: linear-gradient(135deg, #fddb92, #d1fdff);
      }
      .logout {
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
      }

      footer {
        margin-top: 30px;
        font-size: 13px;
        opacity: 0.8;
      }
      /* Notification Panel */

      .notification-box {
        display: none; /* Add this line */
        position: fixed;
        right: 20px;
        top: 120px;
        width: 340px;
        background: white;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        color: #333;
        text-align: left;
        max-height: 450px;
        overflow-y: auto;
        border-top: 5px solid #185a9d;
        transition: all 0.3s ease;
      }

      /* Title */

      .notification-box h3 {
        margin-top: 0;
        margin-bottom: 10px;
        text-align: center;
        font-size: 20px;
        color: #185a9d;
        border-bottom: 2px solid #eee;
        padding-bottom: 6px;
      }

      /* Input */

      .notification-box input {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 10px;
      }

      /* Button */

      .notification-box button {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(135deg, #185a9d, #43cea2);
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      .notification-box button:hover {
        transform: scale(1.05);
      }

      /* Notification card */

      .notification {
        background: #f4f7fb;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        font-size: 14px;
        border-left: 4px solid #185a9d;
      }

      /* Name */

      .notification b {
        color: #185a9d;
      }

      /* Time */

      .notification small {
        color: gray;
        font-size: 12px;
      } /* Notification Bell */

      .bell {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 28px;
        cursor: pointer;
        background: white;
        padding: 10px 15px;
        border-radius: 50%;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        color: #185a9d;
      }

      .count {
        position: absolute;
        top: -5px;
        right: -5px;
        background: red;
        color: white;
        font-size: 12px;
        padding: 3px 6px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <h2>🎓 Welcome Student</h2>

    <div class="dashboard">
      <div class="card feedback">
        <a href="/feedback">Monthly Feedback</a>
      </div>

      <div class="card remarks">
        <a href="/remarks">Send Remarks</a>
      </div>

      <div class="card absent">
        <a href="/absent">Mark Mess Absent</a>
      </div>

      <div class="card logout">
        <a href="/logout">Logout</a>
      </div>
    </div>

    <footer>Hostel Mess Management System</footer>

    <div class="bell" onclick="toggleNotifications()">
      🔔
      <span class="count">{{ notifications|length }}</span>
    </div>

    <div class="notification-box" id="notificationPanel">
      <h3>Notifications</h3>

      <form action="/send_notification" method="POST">
        <input
          type="text"
          name="message"
          placeholder="Write message..."
          style="width: 100%; padding: 6px; margin-bottom: 6px"
          required
        />
        <button type="submit">Send</button>
      </form>

      <hr />

      {% if notifications %} {% for n in notifications %}

      <div class="notification">
        <b>{{ n[1] }}</b>: {{ n[2] }}
        <br />
        <small>{{ n[3] }}</small>
      </div>

      {% endfor %} {% else %}

      <p>No notifications</p>

      {% endif %}
    </div>
    <script>
      function toggleNotifications() {
        let panel = document.getElementById("notificationPanel");

        if (panel.style.display === "none") {
          panel.style.display = "block";
        } else {
          panel.style.display = "none";
        }
      }
    </script>
  </body>
</html>
